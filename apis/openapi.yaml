openapi: 3.0.3
info:
  title: Survey Platform API
  description: |
    REST API for the Survey Platform: surveys, questions, responses, audiences,
    email notifications, translations, and analytics.
    - **Public routes** (no auth): get survey by slug/token, submit response, UI strings.
    - **Protected routes**: require `Authorization: Bearer <token>` (Sanctum).
  version: 1.0.0
servers:
  - url: /api
    description: API base (set to your deployment URL in practice)
tags:
  - name: Auth
    description: Register, login, logout, current user
  - name: Public
    description: No authentication required
  - name: Surveys
    description: Survey CRUD and publish
  - name: Responses
    description: Response list, detail, export
paths:
  /register:
    post:
      tags: [Auth]
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_name, name, email, password, password_confirmation]
              properties:
                company_name: { type: string }
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
                password_confirmation: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { type: object }
                  token: { type: string }
  /login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { type: object }
                  token: { type: string }
        "422":
          description: Validation error / invalid credentials
  /logout:
    post:
      tags: [Auth]
      summary: Logout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
  /user:
    get:
      tags: [Auth]
      summary: Current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { type: object }
  /public/surveys/{slug}:
    get:
      tags: [Public]
      summary: Get survey by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Survey with questions, options, score ranges, audiences, theme
  /public/links/{token}:
    get:
      tags: [Public]
      summary: Get survey by audience link token
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Survey (may include preselected_audience_id)
  /public/surveys/{slug}/submit:
    post:
      tags: [Public]
      summary: Submit survey response
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      question_id: { type: integer }
                      answer_text: { type: string }
                      answer_option_id: { type: integer }
                name: { type: string }
                email: { type: string, format: email }
                audience_id: { type: [ string, integer ] }
                language: { type: string, description: "2-letter code for respondent email" }
      responses:
        "201":
          description: Response created; returns response_id, score, advice, etc.
        "422":
          description: Validation error
  /public/ui-strings:
    get:
      tags: [Public]
      summary: Get public UI strings (translations)
      responses:
        "200":
          description: Key-value UI strings per language
  /surveys:
    get:
      tags: [Surveys]
      summary: List surveys
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of surveys (company-scoped)
    post:
      tags: [Surveys]
      summary: Create survey
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Created
  /surveys/{id}:
    get:
      tags: [Surveys]
      summary: Get survey
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Survey detail
    put:
      tags: [Surveys]
      summary: Update survey
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      tags: [Surveys]
      summary: Delete survey
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /surveys/{id}/publish:
    post:
      tags: [Surveys]
      summary: Publish survey
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /surveys/{id}/email-settings:
    get:
      tags: [Surveys]
      summary: Get survey email settings
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: SMTP, from, recipients, is_active
    put:
      tags: [Surveys]
      summary: Update survey email settings
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /responses:
    get:
      tags: [Responses]
      summary: List responses
      security: [{ bearerAuth: [] }]
      parameters:
        - name: survey_id
          in: query
          schema: { type: integer }
        - name: format
          in: query
          schema: { type: string, enum: [csv, xlsx] }
          description: For export
      responses:
        "200":
          description: List or export
  /responses/{id}:
    get:
      tags: [Responses]
      summary: Get response detail
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Response with answers, score, advice

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Laravel Sanctum token from login/register
